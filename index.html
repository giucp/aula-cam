<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mis Retos · Aula CAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --mango:#FF6B3D;--mango-dark:#E8511F;--teal:#12B5A4;--sun:#FFC83D;
    --ink:#3B2B4A;--muted:#8C7C93;--surface:#FFFFFF;--line:#F0E3EC;--ok:#1FA86A;
    --shadow:0 14px 30px -12px rgba(90,40,70,.30);--shadow-sm:0 6px 16px -8px rgba(90,40,70,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:"Nunito",-apple-system,"Segoe UI",sans-serif;color:var(--ink);min-height:100dvh;
    background:
      radial-gradient(120% 80% at 12% -8%, #FFE6B8 0%, transparent 46%),
      radial-gradient(120% 80% at 100% 0%, #FFC9DD 0%, transparent 42%),
      linear-gradient(160deg,#FFF1E0 0%,#FDE7F1 55%,#E7F4FF 100%);
    background-attachment:fixed;padding:max(18px,env(safe-area-inset-top)) 16px 40px;
  }
  .wrap{max-width:600px;margin:0 auto}
  .hi{font-family:"Fredoka",sans-serif;font-weight:600;font-size:.92rem;letter-spacing:.04em;text-transform:uppercase;color:var(--mango);margin:6px 0 0}
  h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(1.8rem,7vw,2.5rem);line-height:1.05;margin:.15em 0 .1em}
  .sub{color:var(--muted);font-weight:600;font-size:1.02rem;margin:0 0 22px}
  .star{display:inline-block;transform:translateY(2px)}
  .hidden{display:none !important}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:20px 18px;box-shadow:var(--shadow)}
  .lbl{font-family:"Fredoka",sans-serif;font-weight:600;font-size:.95rem;color:var(--ink);margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .lbl .n{background:var(--sun);color:var(--ink);width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:.85rem;font-weight:700}

  /* inputs */
  .field input{width:100%;font-family:"Nunito",sans-serif;font-weight:700;font-size:1rem;color:var(--ink);
    padding:13px 14px;border:2px solid var(--line);border-radius:14px;background:#FFFDFB;outline:none;margin-bottom:12px}
  .field input::placeholder{color:#BBA9C0;font-weight:600}
  .field input:focus{border-color:var(--teal)}

  .go{margin-top:6px;width:100%;border:none;cursor:pointer;font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.18rem;color:#fff;
    padding:16px;border-radius:18px;background:linear-gradient(180deg,#FF7C4F,var(--mango));box-shadow:0 12px 22px -10px rgba(232,81,31,.7);
    transition:transform .12s,box-shadow .2s,filter .2s;display:flex;align-items:center;justify-content:center;gap:10px}
  .go:hover{filter:brightness(1.03)}
  .go:active{transform:translateY(2px) scale(.99)}
  .go:disabled{background:#E9DFE6;color:#B7A6BD;box-shadow:none;cursor:not-allowed}

  /* top bar (home) */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .salir{background:none;border:none;color:var(--muted);font-family:"Nunito";font-weight:700;cursor:pointer;font-size:.9rem;padding:6px}
  .salir:hover{color:var(--mango)}

  /* materias grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mat{background:#fff;border:2px solid var(--line);border-radius:18px;padding:16px 14px;cursor:pointer;text-align:left;
    font-family:"Nunito";font-weight:700;color:var(--ink);font-size:.98rem;line-height:1.25;transition:transform .12s,border-color .15s,box-shadow .2s;display:flex;flex-direction:column;gap:8px}
  .mat:hover{border-color:#FFCDBB;box-shadow:var(--shadow-sm)}
  .mat:active{transform:scale(.97)}
  .mat .em{font-size:1.7rem}

  /* back */
  .back{background:none;border:none;color:var(--mango);font-family:"Fredoka";font-weight:600;cursor:pointer;font-size:1rem;
    padding:0;margin:0 0 12px;display:inline-flex;align-items:center;gap:6px}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{border:2px solid var(--line);background:#fff;color:var(--ink);font-family:"Nunito";font-weight:700;font-size:.92rem;
    padding:9px 14px;border-radius:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s,border-color .15s,background .15s,color .15s}
  .chip:hover{border-color:#FFCDBB}
  .chip:active{transform:scale(.96)}
  .chip[aria-pressed="true"]{background:var(--mango);border-color:var(--mango);color:#fff;box-shadow:var(--shadow-sm)}

  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:18px}
  .grow{flex:1 1 200px}
  .count{display:flex;gap:7px}
  .count button{width:46px;height:46px;border-radius:14px;border:2px solid var(--line);background:#fff;font-family:"Fredoka";font-weight:600;font-size:1.05rem;color:var(--ink);cursor:pointer;transition:all .14s}
  .count button[aria-pressed="true"]{background:var(--teal);border-color:var(--teal);color:#fff}
  .count button:active{transform:scale(.94)}

  /* states */
  .results{margin-top:24px;display:flex;flex-direction:column;gap:14px}
  .loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:30px 10px;color:var(--muted);font-weight:700;text-align:center}
  .brain{font-size:2.6rem;animation:bob 1.1s ease-in-out infinite}
  .dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--mango);margin:0 3px;animation:bob 1s infinite}
  .dots span:nth-child(2){background:var(--sun);animation-delay:.15s}
  .dots span:nth-child(3){background:var(--teal);animation-delay:.3s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .err{background:#FFF2EE;border:2px solid #FFD3C5;border-radius:18px;padding:16px;color:var(--ink);font-weight:700;margin-top:14px}
  .err small{display:block;margin-top:6px;color:var(--muted);font-weight:600;font-size:.82rem;word-break:break-word}
  .empty{color:var(--muted);font-weight:700;padding:6px 2px 0}

  /* exercise card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow-sm);
    opacity:0;transform:translateY(14px) rotate(-.6deg);animation:deal .45s cubic-bezier(.2,.9,.3,1.2) forwards}
  @keyframes deal{to{opacity:1;transform:none}}
  .tag{display:inline-flex;align-items:center;gap:7px;font-family:"Fredoka";font-weight:600;font-size:.82rem;color:var(--mango);background:#FFEEE6;padding:4px 11px;border-radius:999px;margin-bottom:10px}
  .q{font-size:1.08rem;font-weight:700;line-height:1.45;margin:0}
  .reveals{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .mini{border:2px solid var(--line);background:#fff;cursor:pointer;font-family:"Nunito";font-weight:700;font-size:.9rem;color:var(--ink);padding:9px 14px;border-radius:13px;display:inline-flex;align-items:center;gap:7px;transition:all .14s}
  .mini:active{transform:scale(.96)}
  .mini.hint:hover{border-color:var(--sun)}
  .mini.ans:hover{border-color:var(--ok)}
  .mini[disabled]{opacity:.5;cursor:default}
  .reveal{margin-top:13px;border-radius:14px;padding:13px 14px;font-weight:700;line-height:1.45;animation:pop .3s ease;display:none}
  .reveal.show{display:block}
  .reveal.hint{background:#FFF8E6;border:1px solid #FFE7A8}
  .reveal.ans{background:#EAF8F1;border:1px solid #B9E8D0;color:#13694A}
  .reveal b{font-family:"Fredoka"}
  @keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
  .footer{text-align:center;color:var(--muted);font-weight:700;margin:26px 4px 0;font-size:.95rem}

  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}.card{opacity:1;transform:none}}
  :focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">

  <!-- ╔═══ LOGIN ═══╗ -->
  <section id="vLogin">
    <p class="hi">Aula CAM</p>
    <h1>Mis Retos <span class="star">✨</span></h1>
    <p class="sub">Entra con tu usuario y clave del aula virtual.</p>
    <div class="panel">
      <div class="field">
        <p class="lbl"><span class="n">1</span> Usuario</p>
        <input id="user" type="text" placeholder="tu usuario o correo" autocomplete="username" autocapitalize="none" />
        <p class="lbl"><span class="n">2</span> Clave</p>
        <input id="pass" type="password" placeholder="tu contraseña" autocomplete="current-password" />
      </div>
      <button class="go" id="btnLogin">Entrar</button>
      <div id="loginMsg"></div>
    </div>
  </section>

  <!-- ╔═══ HOME (materias + temas + práctica) ═══╗ -->
  <section id="vHome" class="hidden">
    <div class="topbar">
      <div>
        <p class="hi">Lógica, ciencia y diversión</p>
        <h1 id="saludo">¡Hola! 👋</h1>
      </div>
      <button class="salir" id="btnSalir">Salir</button>
    </div>

    <!-- paso A: materias -->
    <div id="paneMaterias">
      <p class="lbl"><span class="n">1</span> Escoge una materia</p>
      <div class="grid" id="gridMaterias"></div>
    </div>

    <!-- paso B: temas + generar -->
    <div id="paneTemas" class="hidden">
      <button class="back" id="btnBack">‹ Materias</button>
      <div class="panel">
        <p class="lbl" id="tituloMateria" style="color:var(--mango)"></p>
        <p class="lbl"><span class="n">1</span> Escoge un tema</p>
        <div class="chips" id="chips"></div>
        <div id="sinTemas" class="empty hidden">Esta materia aún no tiene temas para practicar. Puedes escribir uno abajo. 👇</div>

        <div class="row">
          <div class="grow">
            <p class="lbl" style="margin-bottom:8px"><span class="n">2</span> ¿Otro tema?</p>
            <div class="field"><input id="otro" type="text" placeholder="Escríbelo aquí…" autocomplete="off" style="margin:0" /></div>
          </div>
          <div>
            <p class="lbl" style="margin-bottom:8px"><span class="n">3</span> ¿Cuántos?</p>
            <div class="count" id="count" role="group" aria-label="Cantidad de retos">
              <button data-n="3">3</button>
              <button data-n="5" aria-pressed="true">5</button>
              <button data-n="8">8</button>
            </div>
          </div>
        </div>
        <button class="go" id="btnGen" disabled>✨ Crear mis retos</button>
      </div>
      <div class="results" id="results" aria-live="polite"></div>
    </div>
  </section>

</div>

<script>
  // ───────── config ─────────
  const API_MOODLE  = "https://aula-cam.vercel.app/api/moodle";
  const API_GENERAR = "https://aula-cam.vercel.app/api/generar";
  const GRADO = "4to grado"; // luego se puede deducir del nombre de la materia (ej. "4G")

  // almacenamiento seguro: usa localStorage si existe, si no, memoria (no rompe la vista previa)
  const store = {
    mem:{},
    get(k){ try{ const v=localStorage.getItem(k); return v==null?null:JSON.parse(v);}catch(e){ return (k in this.mem)?this.mem[k]:null; } },
    set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ this.mem[k]=v; } },
    del(k){ try{ localStorage.removeItem(k);}catch(e){} delete this.mem[k]; }
  };

  const $ = (s)=>document.querySelector(s);
  let SESION = null;        // {nombre, token, materias}
  let materiaSel = null;    // objeto materia
  let temaSel = null;       // string
  let cantidad = 5;

  // ───────── arranque ─────────
  const guardada = store.get("sesion");
  if(guardada && guardada.materias){ SESION = guardada; entrarHome(); }

  // ───────── LOGIN ─────────
  $("#btnLogin").onclick = hacerLogin;
  $("#pass").addEventListener("keydown", e=>{ if(e.key==="Enter") hacerLogin(); });

  async function hacerLogin(){
    const user = $("#user").value.trim();
    const pass = $("#pass").value;
    const msg = $("#loginMsg");
    if(!user || !pass){ msg.innerHTML = `<div class="err">Escribe tu usuario y tu clave.</div>`; return; }
    const btn = $("#btnLogin");
    btn.disabled = true; const txt = btn.textContent; btn.textContent = "Entrando…";
    msg.innerHTML = "";
    try{
      const r = await fetch(API_MOODLE,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ username:user, password:pass })});
      const d = await r.json();
      if(d.error) throw new Error(d.error);
      SESION = { nombre:(d.usuario&&d.usuario.nombre)||"", token:d.token, materias:d.materias||[] };
      store.set("sesion", SESION);
      $("#pass").value = "";
      entrarHome();
    }catch(e){
      const txtErr = /invalid|inválid|incorrect/i.test(String(e.message))
        ? "Usuario o clave incorrectos. Revisa e intenta de nuevo."
        : "No pudimos entrar. Revisa tu internet e intenta otra vez.";
      msg.innerHTML = `<div class="err">${txtErr}<small>${escapeHtml(String(e.message||e))}</small></div>`;
    }finally{ btn.disabled=false; btn.textContent=txt; }
  }

  // ───────── HOME ─────────
  function entrarHome(){
    $("#vLogin").classList.add("hidden");
    $("#vHome").classList.remove("hidden");
    const primer = (SESION.nombre||"").split(" ")[0] || "";
    $("#saludo").innerHTML = `¡Hola, ${escapeHtml(primer)}! 👋`;
    pintarMaterias();
    verMaterias();
  }

  $("#btnSalir").onclick = ()=>{
    store.del("sesion"); SESION=null; materiaSel=null; temaSel=null;
    $("#vHome").classList.add("hidden"); $("#vLogin").classList.remove("hidden");
    $("#user").value=""; $("#loginMsg").innerHTML="";
  };

  function pintarMaterias(){
    const g = $("#gridMaterias"); g.innerHTML="";
    SESION.materias.forEach(m=>{
      const b=document.createElement("button");
      b.className="mat";
      b.innerHTML=`<span class="em">${iconMateria(m.nombre)}</span><span>${escapeHtml(m.nombre)}</span>`;
      b.onclick=()=>abrirMateria(m);
      g.appendChild(b);
    });
  }

  function verMaterias(){ $("#paneTemas").classList.add("hidden"); $("#paneMaterias").classList.remove("hidden"); }
  $("#btnBack").onclick = ()=>{ temaSel=null; $("#results").innerHTML=""; verMaterias(); };

  function abrirMateria(m){
    materiaSel=m; temaSel=null; $("#otro").value=""; $("#results").innerHTML="";
    $("#tituloMateria").textContent = `${iconMateria(m.nombre)}  ${m.nombre}`;
    const temas = temasPracticables(m);
    const chips = $("#chips"); chips.innerHTML="";
    $("#sinTemas").classList.toggle("hidden", temas.length>0);
    temas.forEach(t=>{
      const b=document.createElement("button");
      b.className="chip"; b.setAttribute("aria-pressed","false");
      b.textContent=t.seccion; b.dataset.tema=t.seccion;
      b.onclick=()=>{ temaSel=(temaSel===t.seccion)?null:t.seccion; $("#otro").value=""; pintarChips(); checkReady(); };
      chips.appendChild(b);
    });
    checkReady();
    $("#paneMaterias").classList.add("hidden"); $("#paneTemas").classList.remove("hidden");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function pintarChips(){ $("#chips").querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", String(c.dataset.tema===temaSel))); }

  $("#otro").addEventListener("input", ()=>{ if($("#otro").value.trim()){ temaSel=null; pintarChips(); } checkReady(); });
  $("#count").querySelectorAll("button").forEach(btn=>{
    btn.onclick=()=>{ cantidad=Number(btn.dataset.n); $("#count").querySelectorAll("button").forEach(b=>b.setAttribute("aria-pressed",String(b===btn))); };
  });

  function temaActual(){ return $("#otro").value.trim() || temaSel; }
  function checkReady(){ $("#btnGen").disabled = !temaActual(); }

  // ───────── GENERAR ─────────
  $("#btnGen").onclick = async ()=>{
    const tema = temaActual(); if(!tema) return;
    const res = $("#results"); const btn=$("#btnGen"); btn.disabled=true;
    res.innerHTML = `<div class="loading"><div class="brain">🧠</div>
      <div>Inventando retos de <b>${escapeHtml(tema)}</b> solo para ti…</div>
      <div class="dots"><span></span><span></span><span></span></div></div>`;
    try{
      const r = await fetch(API_GENERAR,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ materia:(materiaSel&&materiaSel.nombre)||"Lógica Matemática", tema, grado:GRADO, cantidad })});
      const d = await r.json();
      if(d.error) throw new Error(d.error);
      if(!d.ejercicios||!d.ejercicios.length) throw new Error("No llegaron ejercicios.");
      render(d.ejercicios);
    }catch(e){
      res.innerHTML = `<div class="err">Uy, los retos no llegaron. Intenta otra vez en un momentico.<small>${escapeHtml(String(e.message||e))}</small></div>`;
    }finally{ btn.disabled=false; }
  };

  function render(ejercicios){
    const res=$("#results"); res.innerHTML="";
    ejercicios.forEach((e,i)=>{
      const c=document.createElement("div"); c.className="card"; c.style.animationDelay=(i*0.08)+"s";
      c.innerHTML=`<span class="tag">🎯 Reto ${i+1}</span>
        <p class="q">${escapeHtml(e.enunciado||"")}</p>
        <div class="reveals">
          ${e.pista?`<button class="mini hint">💡 Pista</button>`:``}
          <button class="mini ans">✅ Ver respuesta</button>
        </div>
        ${e.pista?`<div class="reveal hint"><b>💡 Pista:</b> ${escapeHtml(e.pista)}</div>`:``}
        <div class="reveal ans"><b>Respuesta:</b> ${escapeHtml(e.solucion||"")}</div>`;
      const h=c.querySelector(".mini.hint"), a=c.querySelector(".mini.ans");
      if(h) h.onclick=()=>{ c.querySelector(".reveal.hint").classList.add("show"); h.disabled=true; };
      a.onclick=()=>{ c.querySelector(".reveal.ans").classList.add("show"); a.disabled=true; };
      res.appendChild(c);
    });
    const f=document.createElement("p"); f.className="footer";
    f.textContent=`¡Tú puedes, ${(SESION.nombre||"").split(" ")[0]||""}! 🌟`;
    res.appendChild(f);
  }

  // ───────── helpers ─────────
  function temasPracticables(m){
    return (m.temas||[]).filter(t=>{
      if(!t.seccion || /^general$/i.test(t.seccion.trim())) return false;
      return (t.modulos||[]).some(mod=>["page","resource","url"].includes(mod.tipo));
    });
  }
  function iconMateria(nombre){
    const n=(nombre||"").toLowerCase();
    const map=[["lógic","🧠"],["logic","🧠"],["matemát","🔢"],["matemat","🔢"],["lenguaje","📖"],["castellano","📖"],
      ["inglés","🔤"],["ingles","🔤"],["natural","🔬"],["social","🌎"],["físic","⚽"],["fisic","⚽"],
      ["estétic","🎨"],["estetic","🎨"],["arte","🎨"],["músic","🎵"],["music","🎵"],["religi","✝️"],
      ["informát","💻"],["informat","💻"],["robót","🤖"],["robot","🤖"],["emocional","💗"],
      ["lideraz","🎤"],["comunic","🎤"],["olimpiad","🏅"]];
    for(const [k,e] of map){ if(n.includes(k)) return e; }
    return "📘";
  }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
</script>
</body>
</html>
