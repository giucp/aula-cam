<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mis Retos · Aula CAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ───────── tokens ───────── */
  :root{
    --mango:#FF6B3D;       /* acción principal */
    --mango-dark:#E8511F;
    --teal:#12B5A4;        /* acento secundario */
    --sun:#FFC83D;         /* pop alegre */
    --ink:#3B2B4A;         /* texto, plum cálido (no negro) */
    --muted:#8C7C93;
    --surface:#FFFFFF;
    --line:#F0E3EC;
    --ok:#1FA86A;
    --shadow:0 14px 30px -12px rgba(90,40,70,.30);
    --shadow-sm:0 6px 16px -8px rgba(90,40,70,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:"Nunito",-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    min-height:100dvh;
    background:
      radial-gradient(120% 80% at 12% -8%, #FFE6B8 0%, transparent 46%),
      radial-gradient(120% 80% at 100% 0%, #FFC9DD 0%, transparent 42%),
      linear-gradient(160deg,#FFF1E0 0%,#FDE7F1 55%,#E7F4FF 100%);
    background-attachment:fixed;
    padding:max(18px,env(safe-area-inset-top)) 16px 40px;
  }
  .wrap{max-width:600px;margin:0 auto}

  /* ───────── header ───────── */
  .hi{font-family:"Fredoka",sans-serif;font-weight:600;font-size:.92rem;letter-spacing:.04em;text-transform:uppercase;color:var(--mango);margin:6px 0 0}
  h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(1.9rem,7vw,2.6rem);line-height:1.05;margin:.15em 0 .1em}
  .sub{color:var(--muted);font-weight:600;font-size:1.02rem;margin:0 0 22px}
  .star{display:inline-block;transform:translateY(2px)}

  /* ───────── picker card ───────── */
  .panel{
    background:var(--surface);border:1px solid var(--line);border-radius:24px;
    padding:20px 18px;box-shadow:var(--shadow);
  }
  .lbl{font-family:"Fredoka",sans-serif;font-weight:600;font-size:.95rem;color:var(--ink);margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .lbl .n{background:var(--sun);color:var(--ink);width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:.85rem;font-weight:700}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{
    border:2px solid var(--line);background:#fff;color:var(--ink);
    font-family:"Nunito",sans-serif;font-weight:700;font-size:.92rem;
    padding:9px 14px;border-radius:14px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:transform .12s,border-color .15s,background .15s,color .15s;
  }
  .chip:hover{border-color:#FFCDBB}
  .chip:active{transform:scale(.96)}
  .chip[aria-pressed="true"]{background:var(--mango);border-color:var(--mango);color:#fff;box-shadow:var(--shadow-sm)}
  .chip .ico{font-size:1.05rem}

  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:18px}
  .field{flex:1 1 200px}
  .field input{
    width:100%;font-family:"Nunito",sans-serif;font-weight:700;font-size:1rem;color:var(--ink);
    padding:12px 14px;border:2px solid var(--line);border-radius:14px;background:#FFFDFB;outline:none;
  }
  .field input::placeholder{color:#BBA9C0;font-weight:600}
  .field input:focus{border-color:var(--teal)}

  .count{display:flex;gap:7px}
  .count button{
    width:46px;height:46px;border-radius:14px;border:2px solid var(--line);background:#fff;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.05rem;color:var(--ink);cursor:pointer;transition:all .14s;
  }
  .count button[aria-pressed="true"]{background:var(--teal);border-color:var(--teal);color:#fff}
  .count button:active{transform:scale(.94)}

  .go{
    margin-top:18px;width:100%;border:none;cursor:pointer;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.18rem;color:#fff;
    padding:16px;border-radius:18px;
    background:linear-gradient(180deg,#FF7C4F,var(--mango));
    box-shadow:0 12px 22px -10px rgba(232,81,31,.7);
    transition:transform .12s,box-shadow .2s,filter .2s;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .go:hover{filter:brightness(1.03)}
  .go:active{transform:translateY(2px) scale(.99)}
  .go:disabled{background:#E9DFE6;color:#B7A6BD;box-shadow:none;cursor:not-allowed}

  /* ───────── states ───────── */
  .results{margin-top:24px;display:flex;flex-direction:column;gap:14px}

  .loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:34px 10px;color:var(--muted);font-weight:700}
  .brain{font-size:2.6rem;animation:bob 1.1s ease-in-out infinite}
  .dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--mango);margin:0 3px;animation:bob 1s infinite}
  .dots span:nth-child(2){background:var(--sun);animation-delay:.15s}
  .dots span:nth-child(3){background:var(--teal);animation-delay:.3s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

  .err{background:#FFF2EE;border:2px solid #FFD3C5;border-radius:18px;padding:18px;color:var(--ink);font-weight:700}
  .err small{display:block;margin-top:6px;color:var(--muted);font-weight:600;font-size:.82rem;word-break:break-word}

  /* ───────── exercise card ───────── */
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:18px;
    box-shadow:var(--shadow-sm);opacity:0;transform:translateY(14px) rotate(-.6deg);
    animation:deal .45s cubic-bezier(.2,.9,.3,1.2) forwards;
  }
  @keyframes deal{to{opacity:1;transform:none}}
  .tag{display:inline-flex;align-items:center;gap:7px;font-family:"Fredoka",sans-serif;font-weight:600;
    font-size:.82rem;color:var(--mango);background:#FFEEE6;padding:4px 11px;border-radius:999px;margin-bottom:10px}
  .q{font-size:1.08rem;font-weight:700;line-height:1.45;margin:0}

  .reveals{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .mini{
    border:2px solid var(--line);background:#fff;cursor:pointer;
    font-family:"Nunito",sans-serif;font-weight:700;font-size:.9rem;color:var(--ink);
    padding:9px 14px;border-radius:13px;display:inline-flex;align-items:center;gap:7px;transition:all .14s;
  }
  .mini:active{transform:scale(.96)}
  .mini.hint:hover{border-color:var(--sun)}
  .mini.ans:hover{border-color:var(--ok)}
  .mini[disabled]{opacity:.5;cursor:default}

  .reveal{margin-top:13px;border-radius:14px;padding:13px 14px;font-weight:700;line-height:1.45;
    animation:pop .3s ease;display:none}
  .reveal.show{display:block}
  .reveal.hint{background:#FFF8E6;border:1px solid #FFE7A8}
  .reveal.ans{background:#EAF8F1;border:1px solid #B9E8D0;color:#13694A}
  .reveal b{font-family:"Fredoka",sans-serif}
  @keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}

  .footer{text-align:center;color:var(--muted);font-weight:700;margin:26px 4px 0;font-size:.95rem}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
    .card{opacity:1;transform:none}
  }
  :focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">

  <p class="hi">Aula CAM · Lógica Matemática</p>
  <h1>¡Hola, Martina! <span class="star">✨</span></h1>
  <p class="sub">¿Qué quieres practicar hoy?</p>

  <section class="panel" aria-label="Elegir práctica">
    <p class="lbl"><span class="n">1</span> Escoge un tema</p>
    <div class="chips" id="chips"></div>

    <div class="row">
      <div class="field">
        <p class="lbl" style="margin-bottom:8px"><span class="n">2</span> ¿Otro tema?</p>
        <input id="otro" type="text" placeholder="Escríbelo aquí…" autocomplete="off" />
      </div>
      <div>
        <p class="lbl" style="margin-bottom:8px"><span class="n">3</span> ¿Cuántos?</p>
        <div class="count" id="count" role="group" aria-label="Cantidad de retos">
          <button data-n="3">3</button>
          <button data-n="5" aria-pressed="true">5</button>
          <button data-n="8">8</button>
        </div>
      </div>
    </div>

    <button class="go" id="go" disabled>✨ Crear mis retos</button>
  </section>

  <div class="results" id="results" aria-live="polite"></div>

</div>

<script>
  // ───────── config ─────────
  const API = "https://aula-cam.vercel.app/api/generar"; // tu función en Vercel
  const MATERIA = "Lógica Matemática";
  const GRADO   = "4to grado";

  // Temas reales del aula de Martina. Más adelante esta lista llegará sola desde el login.
  const TEMAS = [
    {t:"Sucesión Numérica", i:"🔢"},
    {t:"Sucesiones Literales", i:"🔤"},
    {t:"Operaciones Básicas", i:"➕"},
    {t:"Pirámides Numéricas", i:"🔺"},
    {t:"Valor Numérico", i:"💎"},
    {t:"Criptoaritmética", i:"🔐"},
    {t:"Analogías Literales", i:"🔁"},
    {t:"Planteo de Ecuaciones", i:"⚖️"},
    {t:"Potenciación", i:"⚡"},
    {t:"Operadores Matemáticos", i:"🧮"},
    {t:"Orden de la Información", i:"📋"},
    {t:"Desafíos Matemáticos", i:"🏆"},
  ];

  // ───────── estado ─────────
  let temaSel = null;
  let cantidad = 5;

  const $ = (s)=>document.querySelector(s);
  const chipsBox = $("#chips");
  const otro = $("#otro");
  const go = $("#go");
  const results = $("#results");

  // pinta los chips
  TEMAS.forEach(({t,i})=>{
    const b = document.createElement("button");
    b.className = "chip";
    b.setAttribute("aria-pressed","false");
    b.innerHTML = `<span class="ico">${i}</span>${t}`;
    b.onclick = ()=>{
      temaSel = (temaSel === t) ? null : t;
      otro.value = "";
      paintChips();
      checkReady();
    };
    b.dataset.tema = t;
    chipsBox.appendChild(b);
  });
  function paintChips(){
    chipsBox.querySelectorAll(".chip").forEach(c=>{
      c.setAttribute("aria-pressed", String(c.dataset.tema === temaSel));
    });
  }

  // campo "otro tema"
  otro.addEventListener("input", ()=>{
    if(otro.value.trim()){ temaSel = null; paintChips(); }
    checkReady();
  });

  // cantidad
  $("#count").querySelectorAll("button").forEach(btn=>{
    btn.onclick = ()=>{
      cantidad = Number(btn.dataset.n);
      $("#count").querySelectorAll("button").forEach(b=>b.setAttribute("aria-pressed", String(b===btn)));
    };
  });

  function temaActual(){ return otro.value.trim() || temaSel; }
  function checkReady(){ go.disabled = !temaActual(); }

  // ───────── generar ─────────
  go.onclick = async ()=>{
    const tema = temaActual();
    if(!tema) return;
    go.disabled = true;
    results.innerHTML = `
      <div class="loading">
        <div class="brain">🧠</div>
        <div>Inventando retos de <b>${escapeHtml(tema)}</b> solo para ti…</div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>`;

    try{
      const r = await fetch(API,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ materia:MATERIA, tema, grado:GRADO, cantidad })
      });
      const data = await r.json();
      if(data.error) throw new Error(data.error);
      if(!data.ejercicios || !data.ejercicios.length) throw new Error("No llegaron ejercicios.");
      render(tema, data.ejercicios);
    }catch(e){
      results.innerHTML = `
        <div class="err">Uy, los retos no llegaron. Intenta otra vez en un momentico.
          <small>${escapeHtml(String(e.message||e))}</small>
        </div>`;
    }finally{
      go.disabled = false;
    }
  };

  function render(tema, ejercicios){
    results.innerHTML = "";
    ejercicios.forEach((e,idx)=>{
      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = (idx*0.08)+"s";
      card.innerHTML = `
        <span class="tag">🎯 Reto ${idx+1}</span>
        <p class="q">${escapeHtml(e.enunciado||"")}</p>
        <div class="reveals">
          ${e.pista ? `<button class="mini hint">💡 Pista</button>` : ``}
          <button class="mini ans">✅ Ver respuesta</button>
        </div>
        ${e.pista ? `<div class="reveal hint"><b>💡 Pista:</b> ${escapeHtml(e.pista)}</div>` : ``}
        <div class="reveal ans"><b>Respuesta:</b> ${escapeHtml(e.solucion||"")}</div>
      `;
      const hintBtn = card.querySelector(".mini.hint");
      const ansBtn  = card.querySelector(".mini.ans");
      if(hintBtn) hintBtn.onclick = ()=>{ card.querySelector(".reveal.hint").classList.add("show"); hintBtn.disabled = true; };
      ansBtn.onclick = ()=>{ card.querySelector(".reveal.ans").classList.add("show"); ansBtn.disabled = true; };
      results.appendChild(card);
    });
    const foot = document.createElement("p");
    foot.className = "footer";
    foot.textContent = "¡Tú puedes, Martina! 🌟 Escoge otro tema cuando quieras.";
    results.appendChild(foot);
    results.scrollIntoView({behavior:"smooth", block:"start"});
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
</script>
</body>
</html>
